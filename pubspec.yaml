name: study_ai
description: "Asystent nauki AI — czat z materiałami (RAG), fiszki, quizy i tryb odpytywania (Claude / GPT)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Stan (BLoC / Cubit)
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  # Dependency injection
  get_it: ^7.7.0
  # HTTP + streaming SSE
  http: ^1.2.1
  # Wybór plików / zdjęć
  file_picker: ^8.0.6
  image_picker: ^1.1.2
  # Parsowanie PDF
  syncfusion_flutter_pdf: ^28.1.33
  # Lokalna persystencja
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  # Narzędzia
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
